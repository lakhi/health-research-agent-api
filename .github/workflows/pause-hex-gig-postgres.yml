# Service principal + AZURE_CREDENTIALS_SOCIALECONPSY secret are already configured
# (Settings → Secrets and variables → Actions). Runs automatically every 6 days to
# re-stop hex-gig-postgres-db before Azure's 7-day auto-restart kicks in — see the
# Cost Context section of .claude/skills/hex-gig-azure-toggle/SKILL.md for why this exists.
# Can still be triggered manually from the GitHub Actions UI at any time.

name: Keep HeX-GiG PostgreSQL paused

on:
  schedule:
    - cron: "0 3 */6 * *"   # every 6 days at 03:00 UTC — beats Azure's 7-day auto-restart
  workflow_dispatch: # Run manually from GitHub Actions UI

jobs:
  stop-postgres:
    runs-on: ubuntu-latest
    steps:
      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS_SOCIALECONPSY }}

      - name: Stop hex-gig-postgres-db if running
        run: |
          STATE=$(az postgres flexible-server show \
            --name hex-gig-postgres-db \
            --resource-group healthsociety \
            --subscription 444c1e5c-ac0d-4420-94ea-d4a5414d20e1 \
            --query "state" -o tsv)
          echo "Current state: $STATE"
          if [ "$STATE" = "Ready" ]; then
            az postgres flexible-server stop \
              --name hex-gig-postgres-db \
              --resource-group healthsociety \
              --subscription 444c1e5c-ac0d-4420-94ea-d4a5414d20e1
            echo "Stopped."
          else
            echo "Already stopped — no action."
          fi

name: Build and Push to Azure Container Registry

on:
  workflow_dispatch:
    inputs:
      project:
        description: 'Project to build and push'
        required: true
        type: choice
        options:
          - hex-gig
          - vax-study
          - ssc-psych
        default: hex-gig

env:
  IMAGE_TAG: latest
  PROJECT_NAME: ${{ secrets.PROJECT_NAME }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set build config
      id: config
      run: |
        if [ "${{ inputs.project }}" = "vax-study" ]; then
          echo "image_name=health-research-api" >> $GITHUB_OUTPUT
          echo "acr_server=vaxacr.azurecr.io" >> $GITHUB_OUTPUT
        elif [ "${{ inputs.project }}" = "ssc-psych" ]; then
          echo "image_name=ssc-psych-agent-api" >> $GITHUB_OUTPUT
          echo "acr_server=sscpsychacr.azurecr.io" >> $GITHUB_OUTPUT
        else
          echo "image_name=hex-gig-agent-api" >> $GITHUB_OUTPUT
          echo "acr_server=hexgigacr.azurecr.io" >> $GITHUB_OUTPUT
        fi

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Login to ACR (hex-gig)
      if: inputs.project == 'hex-gig'
      uses: docker/login-action@v4
      with:
        registry: ${{ secrets.ACR_LOGIN_SERVER }}
        username: ${{ secrets.ACR_USERNAME }}
        password: ${{ secrets.ACR_PASSWORD }}

    - name: Login to ACR (ssc-psych)
      if: inputs.project == 'ssc-psych'
      uses: docker/login-action@v4
      with:
        registry: ${{ secrets.SSC_PSYCH_ACR_LOGIN_SERVER }}
        username: ${{ secrets.SSC_PSYCH_ACR_USERNAME }}
        password: ${{ secrets.SSC_PSYCH_ACR_PASSWORD }}

    - name: Login to ACR (vax-study)
      if: inputs.project == 'vax-study'
      uses: docker/login-action@v4
      with:
        registry: ${{ secrets.VAX_ACR_LOGIN_SERVER }}
        username: ${{ secrets.VAX_ACR_USERNAME }}
        password: ${{ secrets.VAX_ACR_PASSWORD }}

    - name: Build and push Docker image
      uses: docker/build-push-action@v7
      with:
        context: .
        file: ./Dockerfile.azure
        push: true
        platforms: linux/amd64
        tags: |
          ${{ steps.config.outputs.acr_server }}/${{ steps.config.outputs.image_name }}:${{ env.IMAGE_TAG }}
          ${{ steps.config.outputs.acr_server }}/${{ steps.config.outputs.image_name }}:${{ github.sha }}

    - name: Image pushed successfully
      run: |
        echo "✅ Image pushed to: ${{ steps.config.outputs.acr_server }}/${{ steps.config.outputs.image_name }}:${{ env.IMAGE_TAG }}"

  # Deploys atomically after a green build so the app and the SHA-pinned RSS job
  # can never drift apart. Uses the hex-gig-deploy service principal, which has
  # Contributor on exactly hex-gig-agent-api, hex-gig-rss-refresh, and
  # hex-gig-agent-ui — nothing else in the healthsociety RG.
  deploy-hex-gig:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: inputs.project == 'hex-gig'

    steps:
    - name: Azure Login
      uses: azure/login@v2
      with:
        creds: ${{ secrets.HEX_GIG_AZURE_CREDENTIALS }}

    - name: Install containerapp extension
      run: az extension add --name containerapp --upgrade

    - name: Update API Container App (force fresh :latest pull)
      run: |
        az containerapp update \
          --name hex-gig-agent-api \
          --resource-group healthsociety \
          --image hexgigacr.azurecr.io/hex-gig-agent-api:latest \
          --revision-suffix "gh-${{ github.run_number }}-${{ github.run_attempt }}" \
          --output none

    - name: Bump RSS-refresh job to this commit
      run: |
        az containerapp job update \
          --name hex-gig-rss-refresh \
          --resource-group healthsociety \
          --image "hexgigacr.azurecr.io/hex-gig-agent-api:${{ github.sha }}" \
          --output none

    - name: Deploy summary
      run: |
        echo "✅ hex-gig-agent-api → new revision gh-${{ github.run_number }}-${{ github.run_attempt }} (image :latest)"
        echo "✅ hex-gig-rss-refresh → pinned to ${{ github.sha }}"

name: Build and Push to Azure Container Registry

on:
  workflow_dispatch:
    inputs:
      project:
        description: 'Project to build and push'
        required: true
        type: choice
        options:
          - hex-gig
          - vax-study
        default: hex-gig

env:
  IMAGE_TAG: latest
  PROJECT_NAME: ${{ secrets.PROJECT_NAME }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set build config
      id: config
      run: |
        if [ "${{ inputs.project }}" = "vax-study" ]; then
          echo "image_name=health-research-api" >> $GITHUB_OUTPUT
          echo "acr_server=vaxacr.azurecr.io" >> $GITHUB_OUTPUT
        else
          echo "image_name=hex-gig-agent-api" >> $GITHUB_OUTPUT
          echo "acr_server=hexgigacr.azurecr.io" >> $GITHUB_OUTPUT
        fi

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Login to ACR (hex-gig)
      if: inputs.project != 'vax-study'
      uses: docker/login-action@v4
      with:
        registry: ${{ secrets.ACR_LOGIN_SERVER }}
        username: ${{ secrets.ACR_USERNAME }}
        password: ${{ secrets.ACR_PASSWORD }}

    - name: Login to ACR (vax-study)
      if: inputs.project == 'vax-study'
      uses: docker/login-action@v4
      with:
        registry: ${{ secrets.VAX_ACR_LOGIN_SERVER }}
        username: ${{ secrets.VAX_ACR_USERNAME }}
        password: ${{ secrets.VAX_ACR_PASSWORD }}

    - name: Build and push Docker image
      uses: docker/build-push-action@v7
      with:
        context: .
        file: ./Dockerfile.azure
        push: true
        platforms: linux/amd64
        tags: |
          ${{ steps.config.outputs.acr_server }}/${{ steps.config.outputs.image_name }}:${{ env.IMAGE_TAG }}
          ${{ steps.config.outputs.acr_server }}/${{ steps.config.outputs.image_name }}:${{ github.sha }}

    - name: Image pushed successfully
      run: |
        echo "✅ Image pushed to: ${{ steps.config.outputs.acr_server }}/${{ steps.config.outputs.image_name }}:${{ env.IMAGE_TAG }}"
